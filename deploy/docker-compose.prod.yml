version: "3.9"

# ============================================================================
# Docker Compose – Production (DigitalOcean Droplet – 4 GB RAM)
# ============================================================================
#
# Services:
#   api       – FastAPI application (uvicorn, 2 workers)
#   worker    – Celery background worker (2 concurrency)
#
# The MySQL database is a DigitalOcean managed instance – no local container.
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up -d
# ============================================================================

services:
  # ── FastAPI Application ──────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: scraper_api
    ports:
      - "80:8000"
    env_file:
      - ../.env.production
    volumes:
      - scraper_uploads:/app/uploads
      - scraper_exports:/app/exports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    # Override CMD for fewer uvicorn workers (2 is enough for 4 GB droplet)
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "2"

  # ── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: scraper_worker
    env_file:
      - ../.env.production
    volumes:
      - scraper_uploads:/app/uploads
      - scraper_exports:/app/exports
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    # Override CMD for lower concurrency (playwright is heavy)
    command:
      - celery
      - -A
      - app.worker.tasks.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
      - --pool=prefork
      - --max-tasks-per-child=10

volumes:
  scraper_uploads:
    driver: local
  scraper_exports:
    driver: local
